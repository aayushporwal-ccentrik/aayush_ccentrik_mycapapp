_schema-version: 3.3.0
ID: cap_app
version: 1.0.0
description: A simple CAP project.
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: cap_app-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: '${default-url}'
    requires:
      - name: cap_app-db
      - name: cap_app-auth
  - name: cap_app-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: cap_app-db
  - name: cap_app-ui
    type: nodejs
    path: app
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          strictSSL: true
          forwardAuthToken: true
          url: '~{srv-url}'
      - name: cap_app-auth
      
resources:
  - name: cap_app-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: cap_app-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: 'cap_app-${org}-${space}'
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        role-collections:
          - name: 'Viewer (cap_app ${org}-${space})'
            description: generated
            role-template-references:
              - $XSAPPNAME.Viewer
          - name: 'Editor (cap_app ${org}-${space})'
            description: generated
            role-template-references:
              - $XSAPPNAME.Editor
          - name: 'userattributes (cap_app ${org}-${space})'
            description: generated
            role-template-references:
              - $XSAPPNAME.userattributes
